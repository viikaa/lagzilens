  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #fefaf6;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #1a1a2e;
      }
    }

    .boot-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: var(--boot-surface, #fefaf6);
      color: var(--boot-fg, #1a1a2e);
      font-family: 'Poppins', system-ui, sans-serif;
      z-index: 9999;
    }

    @media (prefers-color-scheme: dark) {
      .boot-loader {
        --boot-surface: #1a1a2e;
        --boot-fg: #f0f0f0;
        --boot-fg-muted: #a8a29e;
        --boot-accent: #e8c9a0;
        --boot-ring: rgba(232, 201, 160, 0.15);
      }
    }

    .boot-loader__inner {
      text-align: center;
    }

    .boot-loader__spinner {
      width: 56px;
      height: 56px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      border: 3px solid var(--boot-ring, rgba(155, 93, 115, 0.15));
      border-top-color: var(--boot-accent, #9b5d73);
      animation: boot-spin 1s linear infinite;
    }

    @keyframes boot-spin {
      to { transform: rotate(360deg); }
    }

    .boot-loader__text {
      font-family: 'Poppins', system-ui, sans-serif;
      font-weight: 500;
      font-size: 1.125rem;
      color: var(--boot-fg-muted, #8b7e6a);
      letter-spacing: 0.02em;
    }

    .boot-loader__dots {
      display: inline-flex;
      width: 2.5ch;
      justify-content: flex-start;
      white-space: nowrap;
      margin-left: 0.2rem;
    }

    .boot-loader__dots span {
      opacity: 0;
      color: var(--boot-accent, #9b5d73);
    }

    .boot-loader__dots span:nth-child(1) {
      animation: boot-dot1 1.5s steps(1) infinite;
    }
    .boot-loader__dots span:nth-child(2) {
      animation: boot-dot2 1.5s steps(1) infinite;
    }
    .boot-loader__dots span:nth-child(3) {
      animation: boot-dot3 1.5s steps(1) infinite;
    }

    @keyframes boot-dot1 {
      0%, 100% { opacity: 0; }
      25%, 75% { opacity: 1; }
    }

    @keyframes boot-dot2 {
      0%, 25%, 100% { opacity: 0; }
      50%, 75% { opacity: 1; }
    }

    @keyframes boot-dot3 {
      0%, 50%, 100% { opacity: 0; }
      75% { opacity: 1; }
    }
  </style>
